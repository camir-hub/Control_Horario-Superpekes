{% extends 'admin_login.html' %}
{% block content %}
<div class="login-container">
    <h2>Recuperar contraseña de administrador</h2>
    <form method="post">
        <label for="email">Correo electrónico de administrador:</label>
        <input type="email" id="email" name="email" required autofocus>
        <button type="submit" class="btn">Enviar código de verificación</button>
    </form>
    <p><a href="{{ url_for('admin_login') }}">Volver al login de administrador</a></p>
</div>
{% endblock %}
