<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Acceso | Control Horario</title>
	<style>
		:root {
			--bg: #f3efe8;
			--card: #ffffff;
			--ink: #1c1f24;
			--accent: #0f766e;
			--accent-2: #115e59;
			--muted: #6b7280;
			--ring: #99f6e4;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 20px;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 10% 10%, #d1fae5 0%, transparent 35%),
				radial-gradient(circle at 90% 90%, #bfdbfe 0%, transparent 30%),
				var(--bg);
		}

		.card {
			width: min(420px, 100%);
			background: var(--card);
			border-radius: 16px;
			padding: 28px;
			box-shadow: 0 20px 45px rgba(17, 24, 39, 0.12);
			border: 1px solid #e5e7eb;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.6rem;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
		}

		label {
			display: block;
			margin-bottom: 6px;
			font-weight: 600;
		}

		input {
			width: 100%;
			padding: 11px 12px;
			margin-bottom: 14px;
			border: 1px solid #d1d5db;
			border-radius: 10px;
			font-size: 0.98rem;
		}

		input:focus {
			outline: none;
			border-color: var(--accent);
			box-shadow: 0 0 0 3px var(--ring);
		}

		button {
			width: 100%;
			border: 0;
			border-radius: 10px;
			padding: 12px;
			font-size: 1rem;
			font-weight: 700;
			color: #fff;
			cursor: pointer;
			background: linear-gradient(135deg, var(--accent), var(--accent-2));
		}

		.messages {
			margin: 0 0 14px;
			padding: 10px 12px;
			border-radius: 10px;
			border: 1px solid #fecaca;
			background: #fef2f2;
			color: #991b1b;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Control Horario</h1>
		<p>Accede con tu usuario para registrar la jornada.</p>

		{% with messages = get_flashed_messages() %}
			{% if messages %}
				{% for message in messages %}
					<div class="messages">{{ message }}</div>
				{% endfor %}
			{% endif %}
		{% endwith %}

		<form method="POST" action="{{ url_for('login') }}">
			<label for="username">Usuario</label>
			<input id="username" type="text" name="username" autocomplete="username" required>

			<label for="password">Contraseña</label>
			<input id="password" type="password" name="password" autocomplete="current-password" required>

			<button type="submit">Iniciar sesión</button>
		</form>
	</main>
</body>
</html>
